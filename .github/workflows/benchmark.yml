name: Generate benchmark.json

on:
  schedule:
    - cron: '0 0 1 * *' # Run monthly on the first day
  workflow_dispatch: # Allow manual trigger

env:
  MAIN_PYTHON_VERSION: "3.11"

jobs:
  update-benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Regenerate benchmark.json
        run: uv run python src/mothertoken/benchmark/runner.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Create Pull Request with updated benchmark
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update tokenizer benchmark"
          title: "Update Language Tokenizer Benchmark"
          body: |
            This PR automatically updates `data/benchmark.json` to reflect the latest tokenizer metrics.
            
            _Generated by GitHub Actions._
          branch: "update-benchmark-data"
          base: "main"
