# mothertoken - Tokenizer registry for tokenization benchmarks
# This registry dictates which tokenizers to load and which provider APIs to query.
# `used_by_examples` is discoverability metadata, not a complete model database.

tokenizers:
  - id: gpt-4o
    name: OpenAI o200k_base
    provider: openai
    type: tiktoken
    ref: o200k_base
    access: local
    tokenizer_source: tiktoken
    verification_method: local_fixture_count
    used_by_examples:
      - GPT-4o
      - GPT-4.1
      - GPT-4.5
      - GPT-5
      - o1
      - o3
      - o4-mini
    api_key_env: null
