# mothertoken - Model registry for tokenization benchmarks
# This registry dictates which tokenizers to load and what APIS to query.

models:
  - id: gpt-4o
    name: "GPT-4o"
    type: tiktoken
    ref: o200k_base
    api_key_env: null

  - id: gpt-4
    name: "GPT-4"
    type: tiktoken
    ref: cl100k_base
    api_key_env: null

  - id: llama3
    name: "LLaMA 3"
    type: huggingface
    ref: meta-llama/Meta-Llama-3-8B
    api_key_env: null

  - id: mistral
    name: "Mistral 7B"
    type: huggingface
    ref: mistralai/Mistral-7B-v0.1
    api_key_env: null

  - id: qwen2.5
    name: "Qwen 2.5"
    type: huggingface
    ref: Qwen/Qwen2.5-7B
    api_key_env: null

  - id: gemma2
    name: "Gemma 2"
    type: huggingface
    ref: google/gemma-2-9b
    api_key_env: null

  - id: claude-sonnet
    name: "Claude Sonnet"
    type: anthropic_api
    ref: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY

  - id: gemini-pro
    name: "Gemini Pro"
    type: google_api
    ref: gemini-1.5-pro
    api_key_env: GOOGLE_API_KEY
